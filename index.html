<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>4匹のチワワ健康管理 PoC</title>
  <link rel="icon" href="data:,">
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("scoutTheme");
      const theme =
        param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --cp-bg: #f7f4ef;
      --cp-bg-elevated: #fcfbf8;
      --cp-surface: #ffffff;
      --cp-surface-soft: #f5f5f5;
      --cp-border: #dedede;
      --cp-border-strong: #919191;
      --cp-text: #242424;
      --cp-text-muted: #5c5c5c;
      --cp-text-soft: #6f6f6f;
      --cp-accent: #b11f4b;
      --cp-accent-hover: #9a1a41;
      --cp-accent-soft: rgba(177, 31, 75, 0.08);
      --cp-accent-fg: #ffffff;
      --cp-success: #16a34a;
      --cp-danger: #dc2626;
      --cp-warning: #f59e0b;
      --cp-link: #0078d4;
      --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.12);
      --cp-overlay: rgba(255, 255, 255, 0.8);
      --cp-panel: rgba(255, 255, 255, 0.86);
      --cp-panel-strong: rgba(255, 255, 255, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.55);
      --cp-highlight: rgba(177, 31, 75, 0.12);
    }
    html[data-theme="dark"] {
      color-scheme: dark;
      --cp-bg: #3d3b3a;
      --cp-bg-elevated: #343231;
      --cp-surface: #292929;
      --cp-surface-soft: #2e2e2e;
      --cp-border: #474747;
      --cp-border-strong: #5f5f5f;
      --cp-text: #dedede;
      --cp-text-muted: #919191;
      --cp-text-soft: #b0b0b0;
      --cp-accent: #fd8ea1;
      --cp-accent-hover: #fb7b91;
      --cp-accent-soft: rgba(253, 142, 161, 0.14);
      --cp-accent-fg: #1a1a1a;
      --cp-success: #4ade80;
      --cp-danger: #f87171;
      --cp-warning: #fbbf24;
      --cp-link: #4da6ff;
      --cp-shadow: 0 18px 48px rgba(0, 0, 0, 0.32);
      --cp-overlay: rgba(41, 41, 41, 0.88);
      --cp-panel: rgba(41, 41, 41, 0.72);
      --cp-panel-strong: rgba(41, 41, 41, 0.96);
      --cp-sheen: rgba(255, 255, 255, 0.04);
      --cp-highlight: rgba(253, 142, 161, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--cp-bg);
      color: var(--cp-text);
      font-family: "Segoe UI", Aptos, Calibri, -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 24px;
      align-items: center;
      padding: 28px;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-surface);
      box-shadow: 0 0 2px var(--cp-border), 0 1px 2px var(--cp-border);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--cp-accent);
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.25rem);
      line-height: 1.12;
    }

    .lead {
      max-width: 720px;
      margin: 16px 0 0;
      color: var(--cp-text-muted);
      font-size: 1.05rem;
    }

    .hero-summary {
      min-width: 220px;
      padding: 18px;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-surface-soft);
    }

    .hero-summary strong {
      display: block;
      font-size: 2.3rem;
      line-height: 1;
    }

    .hero-summary span {
      color: var(--cp-text-muted);
      font-size: 0.94rem;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin: 24px 0;
      padding: 16px;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-panel);
    }

    .search {
      flex: 1 1 280px;
      min-width: 240px;
      padding: 10px 12px;
      border: 1px solid var(--cp-border-strong);
      border-radius: 0.625rem;
      background: var(--cp-surface);
      color: var(--cp-text);
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .filter-button,
    .card-button {
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      background: var(--cp-surface);
      color: var(--cp-text);
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease;
    }

    .filter-button {
      padding: 9px 12px;
    }

    .filter-button:hover,
    .card-button:hover {
      border-color: var(--cp-accent);
      background: var(--cp-accent-soft);
    }

    .filter-button.active {
      border-color: var(--cp-accent);
      background: var(--cp-accent);
      color: var(--cp-accent-fg);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
    }

    .card {
      display: flex;
      flex-direction: column;
      gap: 14px;
      min-height: 100%;
      padding: 18px;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-surface);
      box-shadow: 0 0 2px var(--cp-border), 0 1px 2px var(--cp-border);
    }

    .avatar {
      display: grid;
      width: 58px;
      height: 58px;
      place-items: center;
      border-radius: 16px;
      background: var(--cp-accent-soft);
      color: var(--cp-accent);
      font-size: 1.9rem;
      font-weight: 800;
    }

    .card h2 {
      margin: 0;
      font-size: 1.45rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 9px;
      border-radius: 0.625rem;
      background: var(--cp-surface-soft);
      color: var(--cp-text-muted);
      font-size: 0.9rem;
    }

    .label {
      margin: 0 0 4px;
      color: var(--cp-text-soft);
      font-size: 0.86rem;
      font-weight: 700;
    }

    .card p {
      margin: 0;
      color: var(--cp-text-muted);
    }

    .watch-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .watch-item {
      padding: 4px 8px;
      border: 1px solid var(--cp-border);
      border-radius: 0.625rem;
      color: var(--cp-text);
      font-size: 0.88rem;
    }

    .card-button {
      width: 100%;
      margin-top: auto;
      padding: 10px 12px;
      font-weight: 700;
    }

    .detail {
      margin-top: 24px;
      padding: 24px;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-bg-elevated);
    }

    .detail-header {
      display: flex;
      gap: 16px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .detail-title {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .detail h2,
    .section h2 {
      margin: 0;
      font-size: 1.5rem;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .detail-box,
    .section {
      padding: 16px;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-surface);
    }

    .detail-box strong {
      display: block;
      margin-bottom: 6px;
    }

    .section {
      margin-top: 24px;
    }

    .timeline {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-top: 16px;
    }

    .timeline-item {
      padding: 14px;
      border: 1px solid var(--cp-border);
      border-radius: 16px;
      background: var(--cp-surface-soft);
    }

    .timeline-item strong {
      display: block;
      margin-bottom: 4px;
    }

    .empty {
      display: none;
      padding: 24px;
      border: 1px dashed var(--cp-border-strong);
      border-radius: 16px;
      color: var(--cp-text-muted);
      text-align: center;
    }

    .empty.visible {
      display: block;
    }

    @media (max-width: 980px) {
      .hero,
      .grid,
      .detail-grid,
      .timeline {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 680px) {
      .app {
        padding: 20px 14px 36px;
      }

      .hero,
      .grid,
      .detail-grid,
      .timeline {
        grid-template-columns: 1fr;
      }

      .hero {
        padding: 20px;
      }

      .hero-summary {
        min-width: 0;
      }

      .detail-header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="hero">
      <div>
        <p class="eyebrow">PROFILE LIST POC</p>
        <h1>4匹のチワワ健康管理</h1>
        <p class="lead">
          雑な健康管理メモから作った、最初のPoCです。まずは4匹のプロフィール、健康上の注意、今日見たいポイントを一覧で確認できます。
        </p>
      </div>
      <aside class="hero-summary" aria-label="PoC summary">
        <strong>4</strong>
        <span>登録中のチワワ</span>
      </aside>
    </section>

    <section class="toolbar" aria-label="Search and filters">
      <input class="search" id="searchInput" type="search" placeholder="名前・性格・注意点で検索" aria-label="名前・性格・注意点で検索">
      <div class="filters" role="group" aria-label="Filter by care theme">
        <button class="filter-button active" type="button" data-filter="all">すべて</button>
        <button class="filter-button" type="button" data-filter="senior">シニア</button>
        <button class="filter-button" type="button" data-filter="food">食事</button>
        <button class="filter-button" type="button" data-filter="hospital">通院</button>
        <button class="filter-button" type="button" data-filter="vaccine">予定管理</button>
      </div>
    </section>

    <div class="empty" id="emptyState">該当するチワワが見つかりませんでした。</div>
    <section class="grid" id="profileGrid" aria-label="チワワプロフィール一覧"></section>

    <section class="detail" id="detailPanel" aria-live="polite"></section>

    <section class="section">
      <h2>このPoCで確認すること</h2>
      <div class="timeline">
        <div class="timeline-item">
          <strong>1. すぐ見つかる</strong>
          <span>4匹のプロフィールと注意点を一覧で確認できる。</span>
        </div>
        <div class="timeline-item">
          <strong>2. 家族で共有できる</strong>
          <span>誰が見ても、気にするポイントが分かる。</span>
        </div>
        <div class="timeline-item">
          <strong>3. 次の記録に進める</strong>
          <span>次は体重、投薬、通院メモを追加する。</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    const dogs = [
      {
        name: "まめ",
        age: "8歳",
        weight: "2.7kg",
        personality: "甘えん坊で食いしん坊",
        concerns: ["体重増加", "歯石", "膝蓋骨の違和感"],
        nextCare: "週1回の体重測定と、足をかばう動きがないか確認",
        note: "おやつが増えると体重に出やすい。散歩後の歩き方も見ておきたい。",
        tags: ["food"]
      },
      {
        name: "こむぎ",
        age: "5歳",
        weight: "2.2kg",
        personality: "怖がりで環境変化に敏感",
        concerns: ["食欲ムラ", "ストレス性の軟便"],
        nextCare: "食事量と便の状態を毎日メモ",
        note: "来客や大きな音がある日は体調が崩れやすい。食べた量と便の状態をセットで残す。",
        tags: ["food"]
      },
      {
        name: "ちょこ",
        age: "11歳",
        weight: "2.9kg",
        personality: "穏やかで寝る時間が長い",
        concerns: ["心雑音", "シニア期の運動量低下"],
        nextCare: "咳、呼吸、疲れやすさを通院前にまとめる",
        note: "シニアなので、小さな変化を時系列で残したい。通院時に獣医師へ見せやすくする。",
        tags: ["senior", "hospital"]
      },
      {
        name: "ルナ",
        age: "2歳",
        weight: "1.8kg",
        personality: "活発で遊び好き",
        concerns: ["低血糖予防", "ワクチン予定管理"],
        nextCare: "食事間隔とワクチン予定を確認",
        note: "小柄なので食事間隔に注意。ワクチンや予防薬の予定を忘れないようにしたい。",
        tags: ["vaccine", "food"]
      }
    ];

    const grid = document.getElementById("profileGrid");
    const detailPanel = document.getElementById("detailPanel");
    const searchInput = document.getElementById("searchInput");
    const filterButtons = Array.from(document.querySelectorAll(".filter-button"));
    const emptyState = document.getElementById("emptyState");
    let activeFilter = "all";
    let selectedDog = dogs[0];

    function matchesDog(dog, query) {
      const text = [
        dog.name,
        dog.age,
        dog.weight,
        dog.personality,
        dog.concerns.join(" "),
        dog.nextCare,
        dog.note
      ].join(" ");
      const filterMatch = activeFilter === "all" || dog.tags.includes(activeFilter);
      return filterMatch && text.includes(query);
    }

    function renderCards() {
      const query = searchInput.value.trim();
      const visibleDogs = dogs.filter((dog) => matchesDog(dog, query));
      grid.innerHTML = "";
      emptyState.classList.toggle("visible", visibleDogs.length === 0);

      visibleDogs.forEach((dog) => {
        const card = document.createElement("article");
        card.className = "card";
        card.innerHTML = `
          <div class="avatar" aria-hidden="true">${dog.name.slice(0, 1)}</div>
          <div>
            <h2>${dog.name}</h2>
            <ul class="meta">
              <li class="pill">${dog.age}</li>
              <li class="pill">${dog.weight}</li>
            </ul>
          </div>
          <div>
            <p class="label">性格</p>
            <p>${dog.personality}</p>
          </div>
          <div>
            <p class="label">健康上の注意</p>
            <ul class="watch-list">
              ${dog.concerns.map((concern) => `<li class="watch-item">${concern}</li>`).join("")}
            </ul>
          </div>
          <button class="card-button" type="button">詳しく見る</button>
        `;
        card.querySelector("button").addEventListener("click", () => {
          selectedDog = dog;
          renderDetail();
          detailPanel.scrollIntoView({ behavior: "smooth", block: "start" });
        });
        grid.appendChild(card);
      });
    }

    function renderDetail() {
      detailPanel.innerHTML = `
        <div class="detail-header">
          <div class="detail-title">
            <div class="avatar" aria-hidden="true">${selectedDog.name.slice(0, 1)}</div>
            <div>
              <p class="eyebrow">SELECTED PROFILE</p>
              <h2>${selectedDog.name} の詳細</h2>
            </div>
          </div>
          <ul class="meta">
            <li class="pill">${selectedDog.age}</li>
            <li class="pill">${selectedDog.weight}</li>
          </ul>
        </div>
        <div class="detail-grid">
          <div class="detail-box">
            <strong>どんな子？</strong>
            <span>${selectedDog.personality}</span>
          </div>
          <div class="detail-box">
            <strong>今日見ること</strong>
            <span>${selectedDog.nextCare}</span>
          </div>
          <div class="detail-box">
            <strong>家族メモ</strong>
            <span>${selectedDog.note}</span>
          </div>
        </div>
      `;
    }

    searchInput.addEventListener("input", renderCards);
    filterButtons.forEach((button) => {
      button.addEventListener("click", () => {
        activeFilter = button.dataset.filter;
        filterButtons.forEach((item) => item.classList.toggle("active", item === button));
        renderCards();
      });
    });

    renderCards();
    renderDetail();
  </script>
</body>
</html>
